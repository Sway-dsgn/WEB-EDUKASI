<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVix – Login & Daftar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --blue: #1BAAED;
      --blue-dk: #0284c7;
      --blue-lt: #e0f5fd;
      --bg: #f0fbff;
      --ink: #0f172a;
      --soft: #64748b;
      --muted: #94a3b8;
      --white: #ffffff;
      --green: #22c55e;
      --red: #ef4444;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(27, 170, 237, .2), transparent 70%);
      top: -150px;
      left: -150px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(2, 132, 199, .13), transparent 70%);
      bottom: -100px;
      right: -100px;
    }

    .sp {
      position: fixed;
      color: var(--blue);
      pointer-events: none;
      z-index: 0;
      animation: pulse 3s ease-in-out infinite;
    }

    .sp-1 {
      top: 60px;
      left: 80px;
      font-size: 1.5rem;
      animation-delay: 0s;
    }

    .sp-2 {
      top: 100px;
      right: 120px;
      font-size: 1rem;
      animation-delay: .8s;
    }

    .sp-3 {
      bottom: 80px;
      left: 140px;
      font-size: 1.2rem;
      animation-delay: 1.4s;
    }

    .sp-4 {
      bottom: 60px;
      right: 90px;
      font-size: 1.4rem;
      animation-delay: 2s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .3;
        transform: scale(1)
      }

      50% {
        opacity: .9;
        transform: scale(1.3)
      }
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 32px;
      padding: 40px 44px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(27, 170, 237, .13), 0 4px 16px rgba(0, 0, 0, .04);
      border: 1.5px solid rgba(27, 170, 237, .1);
    }

    .card-logo {
      display: flex;
      justify-content: center;
      margin-bottom: -10px;
    }

    .card-logo img {
      height: 120px;
      width: auto;
      mix-blend-mode: multiply;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--ink);
      text-align: center;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: .85rem;
      color: var(--soft);
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: #f0fbff;
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all .25s ease;
    }

    .tab-btn.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 14px rgba(27, 170, 237, .3);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .ico {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.8;
      transition: stroke .2s;
      pointer-events: none;
    }

    .input-wrap:focus-within .ico {
      stroke: var(--blue);
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      border-radius: 14px;
      border: 1.5px solid #e0f5fd;
      background: #f8fdff;
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      color: var(--ink);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .input-wrap input::placeholder {
      color: var(--muted);
      font-weight: 300;
    }

    .input-wrap input:focus {
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(27, 170, 237, .1);
    }

    .alert {
      padding: 11px 14px;
      border-radius: 12px;
      font-size: .84rem;
      font-weight: 600;
      margin-bottom: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .alert.show {
      display: flex;
    }

    .alert.error {
      background: #fef2f2;
      color: var(--red);
      border: 1.5px solid #fecaca;
    }

    .alert.success {
      background: #f0fdf4;
      color: var(--green);
      border: 1.5px solid #bbf7d0;
    }

    .btn-main {
      width: 100%;
      margin-top: 6px;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: var(--blue);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .25s, transform .2s, box-shadow .25s;
      box-shadow: 0 6px 20px rgba(27, 170, 237, .35);
    }

    .btn-main:hover:not(:disabled) {
      background: var(--blue-dk);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(27, 170, 237, .4);
    }

    .btn-main:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-main:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .btn-main .arr {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .22);
      display: grid;
      place-items: center;
      font-size: .78rem;
      transition: transform .25s;
    }

    .btn-main:hover:not(:disabled) .arr {
      transform: rotate(45deg);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    .btn-main.loading .spinner {
      display: block;
    }

    .btn-main.loading .btn-text,
    .btn-main.loading .arr {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .pw-strength {
      margin-top: 8px;
      display: none;
    }

    .pw-strength.show {
      display: block;
    }

    .pw-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }

    .pw-bar {
      flex: 1;
      height: 4px;
      border-radius: 50px;
      background: #e0f5fd;
      transition: background .3s;
    }

    .pw-bar.weak {
      background: #f87171;
    }

    .pw-bar.medium {
      background: #fb923c;
    }

    .pw-bar.strong {
      background: var(--green);
    }

    .pw-label {
      font-size: .72rem;
      font-weight: 700;
    }

    .pw-label.weak {
      color: #f87171;
    }

    .pw-label.medium {
      color: #fb923c;
    }

    .pw-label.strong {
      color: var(--green);
    }

    .page-footer {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      font-size: .73rem;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      z-index: 9999;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: #0f172a;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
      opacity: 0;
      transition: all .3s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .toast.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    @media(max-width:480px) {
      .login-card {
        padding: 32px 20px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="sp sp-1">✦</div>
  <div class="sp sp-2">✦</div>
  <div class="sp sp-3">✦</div>
  <div class="sp sp-4">✦</div>

  <div class="login-card">
    <div class="card-logo">
      <img src="WhatsApp Image 2026-05-05 at 18.33.04.png" alt="EduVix.ID" onerror="this.style.display='none'" />
    </div>

    <h1 class="card-title">Halo, Selamat Datang!</h1>
    <p class="card-sub">Masuk atau daftar untuk mulai belajar bareng EduVix 👋</p>

    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">Masuk</button>
      <button class="tab-btn" id="tabDaftar">Daftar</button>
    </div>

    <div class="alert" id="alertBox"><span id="alertMsg"></span></div>

    <div class="form-panel active" id="panelLogin">
      <div class="form-group">
        <label for="loginUsername">Username</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
          <input type="text" id="loginUsername" placeholder="Username kamu" autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
          <input type="password" id="loginPassword" placeholder="Password kamu" autocomplete="current-password" />
        </div>
      </div>
      <button class="btn-main" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-text">Masuk</span>
        <span class="arr">↗</span>
      </button>
    </div>

    <div class="form-panel" id="panelDaftar">
      <div class="form-group">
        <label for="regNama">Nama Lengkap</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
          <input type="text" id="regNama" placeholder="Nama lengkap kamu" />
        </div>
      </div>
      <div class="form-group">
        <label for="regUsername">Username</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input type="text" id="regUsername" placeholder="Username unik kamu" autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
          <input type="password" id="regPassword" placeholder="Min. 6 karakter" autocomplete="new-password" />
        </div>
        <div class="pw-strength" id="pwStrength">
          <div class="pw-bars">
            <div class="pw-bar" id="bar1"></div>
            <div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div>
          </div>
          <span class="pw-label" id="pwLabel">Lemah</span>
        </div>
      </div>
      <button class="btn-main" id="btnDaftar">
        <div class="spinner"></div>
        <span class="btn-text">Buat Akun</span>
        <span class="arr">↗</span>
      </button>
    </div>
  </div>

  <p class="page-footer">© 2026 EduVix.ID · All rights reserved</p>
  <div class="toast" id="toast"></div>

  <script src="api.js"></script>
  <script>
    (function () {
      'use strict';

      // ── REDIRECT LOGIN ──
      if (localStorage.getItem('eduvix_token')) {
        window.location.href = 'dashboard.html';
      }

      // ── ELEMENTS ──
      const tabLogin = document.getElementById('tabLogin');
      const tabDaftar = document.getElementById('tabDaftar');
      const panelLogin = document.getElementById('panelLogin');
      const panelDaftar = document.getElementById('panelDaftar');
      const alertBox = document.getElementById('alertBox');
      const alertMsg = document.getElementById('alertMsg');
      const toastEl = document.getElementById('toast');
      const btnLogin = document.getElementById('btnLogin');
      const btnDaftar = document.getElementById('btnDaftar');

      let toastTimeout = null;

      // ── TAB SWITCH ──
      tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabDaftar.classList.remove('active');
        panelLogin.classList.add('active');
        panelDaftar.classList.remove('active');
        clearAlert();
      });

      tabDaftar.addEventListener('click', () => {
        tabDaftar.classList.add('active');
        tabLogin.classList.remove('active');
        panelDaftar.classList.add('active');
        panelLogin.classList.remove('active');
        clearAlert();
      });

      // ── ALERT ──
      function showAlert(msg, type) {
        alertMsg.textContent = msg;
        alertBox.className = 'alert show ' + type;
      }

      function clearAlert() {
        alertBox.className = 'alert';
      }

      // ── TOAST ──
      function showToast(msg, type, duration) {
        toastEl.textContent = msg;
        toastEl.className = 'toast show ' + (type || '');
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
          toastEl.classList.remove('show');
        }, duration || 2500);
      }

      // ── LOADING ──
      function setLoading(btn, loading) {
        btn.classList.toggle('loading', loading);
        btn.disabled = loading;
      }

      // ── PASSWORD STRENGTH ──
      document.getElementById('regPassword').addEventListener('input', function () {
        const pw = this.value;
        const pwStrength = document.getElementById('pwStrength');

        if (!pw) {
          pwStrength.classList.remove('show');
          return;
        }

        pwStrength.classList.add('show');
        let score = 0;

        if (pw.length >= 6) score++;
        if (/[A-Z]/.test(pw) || /[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw) || pw.length >= 10) score++;

        score = Math.max(1, score);

        const bars = [
          document.getElementById('bar1'),
          document.getElementById('bar2'),
          document.getElementById('bar3')
        ];
        const label = document.getElementById('pwLabel');

        bars.forEach(b => b.className = 'pw-bar');

        if (score === 1) {
          bars[0].classList.add('weak');
          label.textContent = 'Lemah';
          label.className = 'pw-label weak';
        } else if (score === 2) {
          bars[0].classList.add('medium');
          bars[1].classList.add('medium');
          label.textContent = 'Sedang';
          label.className = 'pw-label medium';
        } else if (score === 3) {
          bars.forEach(b => b.classList.add('strong'));
          label.textContent = 'Kuat';
          label.className = 'pw-label strong';
        }
      });

      // ── LOGIN ──
      btnLogin.addEventListener('click', async () => {
        clearAlert();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username) {
          showAlert('Username tidak boleh kosong!', 'error');
          return;
        }
        if (!password) {
          showAlert('Password tidak boleh kosong!', 'error');
          return;
        }

        setLoading(btnLogin, true);

        try {
          if (typeof EduvixAPI === 'undefined') {
            throw new Error('API tidak terhubung. Pastikan api.js sudah di-load.');
          }

          const data = await EduvixAPI.login(username, password);
          showToast('Login berhasil! 🎉', 'success');

          if (data.user && data.user.streak > 1) {
            showToast('🔥 ' + data.user.streak + ' hari streak!', 'success', 3000);
          }

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } catch (err) {
          setLoading(btnLogin, false);
          console.error('Login error:', err);
          showAlert('❌ ' + (err.message || 'Login gagal'), 'error');
        }
      });

      // ── REGISTER ──
      btnDaftar.addEventListener('click', async () => {
        clearAlert();
        const nama = document.getElementById('regNama').value.trim();
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;

        if (!nama) {
          showAlert('Nama tidak boleh kosong!', 'error');
          return;
        }
        if (!username) {
          showAlert('Username tidak boleh kosong!', 'error');
          return;
        }
        if (username.length < 3) {
          showAlert('Username minimal 3 karakter!', 'error');
          return;
        }
        if (!password) {
          showAlert('Password tidak boleh kosong!', 'error');
          return;
        }
        if (password.length < 6) {
          showAlert('Password minimal 6 karakter!', 'error');
          return;
        }

        setLoading(btnDaftar, true);

        try {
          if (typeof EduvixAPI === 'undefined') {
            throw new Error('API tidak terhubung. Pastikan api.js sudah di-load.');
          }

          await EduvixAPI.register(nama, username, password);
          showAlert('✅ Akun berhasil dibuat!', 'success');
          showToast('Selamat datang di EDUVIX! 🚀', 'success', 3000);

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } catch (err) {
          setLoading(btnDaftar, false);
          console.error('Register error:', err);
          showAlert('❌ ' + (err.message || 'Pendaftaran gagal'), 'error');
        }
      });

      // ── ENTER KEY ──
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        if (panelLogin.classList.contains('active')) {
          btnLogin.click();
        } else if (panelDaftar.classList.contains('active')) {
          btnDaftar.click();
        }
      });
    })();
  </script>
</body>

</html>
