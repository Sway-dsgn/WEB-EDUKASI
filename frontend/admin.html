<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EDUVIX.ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
            --text-mid: #94a3b8;
            --indigo: #6366f1;
            --red: #ef4444;
            --emerald: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: none; /* Sembunyikan dulu sampai login */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .refresh-btn, .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover, .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .logout-btn:hover {
            background: var(--red);
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-mid);
            font-weight: 600;
        }

        td {
            font-size: 14px;
            color: var(--text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--emerald);
        }

        .badge-banned {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
        }

        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ban {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
        }

        .btn-ban:hover {
            background: var(--red);
            color: #fff;
        }

        .btn-unban {
            background: rgba(16, 185, 129, 0.1);
            color: var(--emerald);
        }

        .btn-unban:hover {
            background: var(--emerald);
            color: #fff;
        }

        .feedback-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .feedback-user {
            font-weight: 700;
            color: var(--indigo);
        }

        .feedback-date {
            color: var(--text-mid);
        }

        .feedback-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
        }

        /* ─── LOGIN FORM ────────────────────────────── */
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: block; /* Tampilkan di awal */
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-mid);
            text-align: center;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-mid);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--indigo);
            background: rgba(255, 255, 255, 0.05);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--indigo);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-weight: 600;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Card Login -->
    <div class="login-card" id="loginCard">
        <h2>Admin Login</h2>
        <p>Gunakan akun khusus admin untuk masuk.</p>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username admin">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
        </div>
        <button class="btn-login" onclick="handleLogin()">Masuk Ke Panel</button>
    </div>

    <!-- Container Utama Admin (Hidden by default) -->
    <div class="container" id="adminContainer">
        <header>
            <h1>Admin Panel</h1>
            <div class="header-actions">
                <button class="refresh-btn" onclick="loadAll()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>
        </header>

        <div class="grid">
            <!-- Card Daftar User -->
            <div class="card">
                <h2><i class="fas fa-users"></i> Daftar Pengguna</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Level</th>
                                <th>Streak</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-mid);">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Card Feedback -->
            <div class="card">
                <h2><i class="fas fa-comment-alt"></i> Feedback Masuk</h2>
                <div id="feedbackList">
                    <div style="text-align: center; color: var(--text-mid);">Memuat data...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">Pesan muncul di sini</div>

    <script>
        const API_URL = (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
                        ? 'http://localhost:5000' 
                        : window.location.origin;
        let adminToken = localStorage.getItem('admin_token');

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderColor = isError ? 'var(--red)' : 'var(--border)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Cek Sesi saat buka halaman
        if (adminToken) {
            showAdminPanel();
        }

        function showAdminPanel() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
            document.body.style.display = 'block'; // Reset flex centering
            document.body.style.padding = '40px 20px';
            loadAll();
        }

        function showLoginForm() {
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('adminContainer').style.display = 'none';
            document.body.style.display = 'flex';
            document.body.style.justifyContent = 'center';
            document.body.style.alignItems = 'center';
        }

        async function handleLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;

            if (!userIn || !passIn) {
                showToast('Username dan password wajib diisi!', true);
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userIn, password: passIn })
                });
                const data = await res.json();

                if (res.ok) {
                    // Simpan token sementara
                    localStorage.setItem('admin_token', data.token);
                    adminToken = data.token;
                    
                    // Cek apakah beneran admin dengan mencoba tarik data
                    const testRes = await fetch(`${API_URL}/api/admin/users`, {
                        headers: { 'Authorization': `Bearer ${adminToken}` }
                    });
                    
                    if (testRes.status === 403) {
                        showToast('Akses ditolak! Akun Anda bukan Admin.', true);
                        localStorage.removeItem('admin_token');
                        return;
                    }

                    showToast('Login Berhasil!');
                    showAdminPanel();
                } else {
                    showToast(data.error || 'Login gagal', true);
                }
            } catch (error) {
                showToast('Gagal terhubung ke server', true);
            }
        }

        function handleLogout() {
            localStorage.removeItem('admin_token');
            adminToken = null;
            showToast('Berhasil keluar.');
            showLoginForm();
        }

        async function loadAll() {
            if (!adminToken) return;
            await Promise.all([loadUsers(), loadFeedback()]);
        }

        async function loadUsers() {
            const tbody = document.getElementById('userTableBody');
            try {
                const res = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                if (res.status === 401 || res.status === 403) {
                    handleLogout();
                    return;
                }
                
                const data = await res.json();
                
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-mid);">Belum ada user.</td></tr>`;
                    return;
                }

                data.forEach(u => {
                    // Sembunyikan akun admin sendiri dari daftar ban biar kaga ngebanned diri sendiri
                    if (u.username === 'admin_eduvix') return;

                    const tr = document.createElement('tr');
                    const isBanned = u.is_banned === 1;
                    
                    tr.innerHTML = `
                        <td style="font-weight:700;">${u.username}</td>
                        <td>Lv. ${u.level || 1}</td>
                        <td>🔥 ${u.streak || 0}</td>
                        <td>
                            <span class="badge ${isBanned ? 'badge-banned' : 'badge-active'}">
                                ${isBanned ? 'Diblokir' : 'Aktif'}
                            </span>
                        </td>
                        <td>
                            <button class="btn-action ${isBanned ? 'btn-unban' : 'btn-ban'}" 
                                    onclick="toggleBan('${u.username}', ${isBanned ? 0 : 1})">
                                ${isBanned ? 'Unban' : 'Ban'}
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--red);">Gagal memuat data user.</td></tr>`;
            }
        }

        async function loadFeedback() {
            const list = document.getElementById('feedbackList');
            try {
                const res = await fetch(`${API_URL}/api/admin/feedback`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await res.json();
                
                list.innerHTML = '';
                if (data.length === 0) {
                    list.innerHTML = `<div style="text-align: center; color: var(--text-mid);">Belum ada feedback.</div>`;
                    return;
                }

                data.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'feedback-item';
                    
                    const date = new Date(f.created_at).toLocaleString('id-ID', {
                        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                    });

                    item.innerHTML = `
                        <div class="feedback-header">
                            <span class="feedback-user">${f.nama} (@${f.username})</span>
                            <span class="feedback-date">${date}</span>
                        </div>
                        <div class="feedback-text">${f.pesan}</div>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                list.innerHTML = `<div style="text-align: center; color: var(--red);">Gagal memuat feedback.</div>`;
            }
        }

        async function toggleBan(username, status) {
            try {
                const res = await fetch(`${API_URL}/api/admin/ban`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ username, status })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast(data.message);
                    loadUsers(); // Reload table
                } else {
                    showToast(data.error || 'Gagal mengubah status', true);
                }
            } catch (error) {
                showToast('Terjadi kesalahan jaringan', true);
            }
        }
    </script>
</body>
</html>
