<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EDUVIX.ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
            --text-mid: #94a3b8;
            --indigo: #6366f1;
            --red: #ef4444;
            --emerald: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: none; /* Sembunyikan dulu sampai login */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .refresh-btn, .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover, .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .logout-btn:hover {
            background: var(--red);
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-mid);
            font-weight: 600;
        }

        td {
            font-size: 14px;
            color: var(--text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--emerald);
        }

        .badge-banned {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
        }

        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ban {
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
        }

        .btn-ban:hover {
            background: var(--red);
            color: #fff;
        }

        .btn-unban {
            background: rgba(16, 185, 129, 0.1);
            color: var(--emerald);
        }

        .btn-unban:hover {
            background: var(--emerald);
            color: #fff;
        }

        .feedback-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .feedback-user {
            font-weight: 700;
            color: var(--indigo);
        }

        .feedback-date {
            color: var(--text-mid);
        }

        .feedback-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
        }

        /* ─── LOGIN FORM ────────────────────────────── */
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: block; /* Tampilkan di awal */
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-mid);
            text-align: center;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-mid);
            margin-bottom: 8px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--indigo);
            background: rgba(255, 255, 255, 0.05);
            outline: none;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-group select {
            appearance: none;
        }

        .form-group select option {
            background: var(--card);
            color: var(--text);
        }

        .btn-submit {
            padding: 12px 24px;
            background: var(--indigo);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: inline-block;
        }
        .btn-submit:hover {
            background: #4f46e5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--indigo);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-weight: 600;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Card Login -->
    <div class="login-card" id="loginCard">
        <h2>Admin Login</h2>
        <p>Gunakan akun khusus admin untuk masuk.</p>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username admin">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
        </div>
        <button class="btn-login" onclick="handleLogin()">Masuk Ke Panel</button>
    </div>

    <!-- Container Utama Admin (Hidden by default) -->
    <div class="container" id="adminContainer">
        <header>
            <h1>Admin Panel</h1>
            <div class="header-actions">
                <button class="refresh-btn" onclick="loadAll()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>
        </header>

        <div class="grid">
            <!-- Card Daftar User -->
            <div class="card">
                <h2><i class="fas fa-users"></i> Daftar Pengguna</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Level</th>
                                <th>Streak</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-mid);">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Card Feedback -->
            <div class="card">
                <h2><i class="fas fa-comment-alt"></i> Feedback Masuk</h2>
                <div id="feedbackList">
                    <div style="text-align: center; color: var(--text-mid);">Memuat data...</div>
                </div>
            </div>

            <!-- Card Kelola Materi -->
            <div class="card">
                <h2><i class="fas fa-book"></i> Tambah Materi Baru</h2>
                <form id="form-materi" onsubmit="submitMateri(event)">
                    <div class="form-group">
                        <label>ID Materi (contoh: materi_02)</label>
                        <input type="text" id="m_id" required>
                    </div>
                    <div class="form-group">
                        <label>Judul Materi</label>
                        <input type="text" id="m_title" required>
                    </div>
                    <div class="form-group">
                        <label>Deskripsi Singkat</label>
                        <input type="text" id="m_desc" required>
                    </div>
                    <div class="form-group">
                        <label>Konten HTML</label>
                        <textarea id="m_html" required placeholder="Gunakan tag HTML seperti <h2>, <p> untuk format konten."></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Simpan Materi</button>
                </form>
            </div>

            <!-- Card Kelola Quiz -->
            <div class="card">
                <h2><i class="fas fa-question-circle"></i> Tambah Soal Kuis Baru</h2>
                <form id="form-quiz" onsubmit="submitQuiz(event)">
                    <div class="form-group">
                        <label>ID Quiz</label>
                        <input type="text" id="q_id" value="default" required>
                    </div>
                    <div class="form-group">
                        <label>Pertanyaan</label>
                        <textarea id="q_question" required rows="2"></textarea>
                    </div>
                    <div class="options-grid" style="margin-bottom: 20px;">
                        <div class="form-group" style="margin-bottom:0;"><label>Pilihan A</label><input type="text" id="q_opt0" required></div>
                        <div class="form-group" style="margin-bottom:0;"><label>Pilihan B</label><input type="text" id="q_opt1" required></div>
                        <div class="form-group" style="margin-bottom:0;"><label>Pilihan C</label><input type="text" id="q_opt2" required></div>
                        <div class="form-group" style="margin-bottom:0;"><label>Pilihan D</label><input type="text" id="q_opt3" required></div>
                    </div>
                    <div class="form-group">
                        <label>Jawaban Benar</label>
                        <select id="q_correct" required>
                            <option value="0">Pilihan A</option>
                            <option value="1">Pilihan B</option>
                            <option value="2">Pilihan C</option>
                            <option value="3">Pilihan D</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Penjelasan</label>
                        <textarea id="q_explanation" required rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Simpan Soal Kuis</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast">Pesan muncul di sini</div>

    <script>
        const API_URL = (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
                        ? 'http://localhost:5000' 
                        : window.location.origin;
        let adminToken = localStorage.getItem('admin_token');

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderColor = isError ? 'var(--red)' : 'var(--border)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Cek Sesi saat buka halaman
        if (adminToken) {
            showAdminPanel();
        }

        function showAdminPanel() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
            document.body.style.display = 'block'; // Reset flex centering
            document.body.style.padding = '40px 20px';
            loadAll();
        }

        function showLoginForm() {
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('adminContainer').style.display = 'none';
            document.body.style.display = 'flex';
            document.body.style.justifyContent = 'center';
            document.body.style.alignItems = 'center';
        }

        async function handleLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;

            if (!userIn || !passIn) {
                showToast('Username dan password wajib diisi!', true);
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userIn, password: passIn })
                });
                const data = await res.json();

                if (res.ok) {
                    // Simpan token sementara
                    localStorage.setItem('admin_token', data.token);
                    adminToken = data.token;
                    
                    // Cek apakah beneran admin dengan mencoba tarik data
                    const testRes = await fetch(`${API_URL}/api/admin/users`, {
                        headers: { 'Authorization': `Bearer ${adminToken}` }
                    });
                    
                    if (testRes.status === 403) {
                        showToast('Akses ditolak! Akun Anda bukan Admin.', true);
                        localStorage.removeItem('admin_token');
                        return;
                    }

                    showToast('Login Berhasil!');
                    showAdminPanel();
                } else {
                    showToast(data.error || 'Login gagal', true);
                }
            } catch (error) {
                showToast('Gagal terhubung ke server', true);
            }
        }

        function handleLogout() {
            localStorage.removeItem('admin_token');
            adminToken = null;
            showToast('Berhasil keluar.');
            showLoginForm();
        }

        async function loadAll() {
            if (!adminToken) return;
            await Promise.all([loadUsers(), loadFeedback(), loadMateri(), loadQuiz()]);
        }

        async function loadUsers() {
            const tbody = document.getElementById('userTableBody');
            try {
                const res = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                if (res.status === 401 || res.status === 403) {
                    handleLogout();
                    return;
                }
                
                const data = await res.json();
                
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-mid);">Belum ada user.</td></tr>`;
                    return;
                }

                data.forEach(u => {
                    // Sembunyikan akun admin sendiri dari daftar ban biar kaga ngebanned diri sendiri
                    if (u.username === 'admin_eduvix') return;

                    const tr = document.createElement('tr');
                    const isBanned = u.is_banned === 1;
                    
                    tr.innerHTML = `
                        <td style="font-weight:700;">${u.username}</td>
                        <td>Lv. ${u.level || 1}</td>
                        <td>🔥 ${u.streak || 0}</td>
                        <td>
                            <span class="badge ${isBanned ? 'badge-banned' : 'badge-active'}">
                                ${isBanned ? 'Diblokir' : 'Aktif'}
                            </span>
                        </td>
                        <td>
                            <button class="btn-action ${isBanned ? 'btn-unban' : 'btn-ban'}" 
                                    onclick="toggleBan('${u.username}', ${isBanned ? 0 : 1})">
                                ${isBanned ? 'Unban' : 'Ban'}
                            </button>
                            <button class="btn-action" style="background: rgba(239, 68, 68, 0.1); color: var(--red); margin-left: 8px;" 
                                    onclick="deleteUser('${u.username}')">
                                Hapus
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--red);">Gagal memuat data user.</td></tr>`;
            }
        }

        async function loadFeedback() {
            const list = document.getElementById('feedbackList');
            try {
                const res = await fetch(`${API_URL}/api/admin/feedback`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await res.json();
                
                list.innerHTML = '';
                if (data.length === 0) {
                    list.innerHTML = `<div style="text-align: center; color: var(--text-mid);">Belum ada feedback.</div>`;
                    return;
                }

                data.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'feedback-item';
                    
                    const date = new Date(f.created_at).toLocaleString('id-ID', {
                        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                    });

                    item.innerHTML = `
                        <div class="feedback-header">
                            <span class="feedback-user">${f.nama} (@${f.username})</span>
                            <span class="feedback-date">${date}</span>
                        </div>
                        <div class="feedback-text">${f.pesan}</div>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                list.innerHTML = `<div style="text-align: center; color: var(--red);">Gagal memuat feedback.</div>`;
            }
        }

        async function toggleBan(username, status) {
            try {
                const res = await fetch(`${API_URL}/api/admin/ban`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ username, status })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast(data.message);
                    loadUsers(); // Reload table
                } else {
                    showToast(data.error || 'Gagal mengubah status', true);
                }
            } catch (error) {
                showToast('Terjadi kesalahan jaringan', true);
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Yakin ingin MENGHAPUS akun ${username} beserta semua datanya secara permanen?`)) return;
            try {
                const res = await fetch(`${API_URL}/api/admin/users/${username}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message);
                    loadUsers();
                } else {
                    showToast(data.error || 'Gagal menghapus user', true);
                }
            } catch (error) {
                showToast('Terjadi kesalahan jaringan', true);
            }
        }

        async function submitMateri(e) {
            e.preventDefault();
            const payload = {
                materi_id: document.getElementById('m_id').value,
                title: document.getElementById('m_title').value,
                description: document.getElementById('m_desc').value,
                content_html: document.getElementById('m_html').value
            };
            try {
                const res = await fetch(`${API_URL}/api/admin/materi`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message);
                    document.getElementById('form-materi').reset();
                    loadMateri();
                } else {
                    showToast(data.error || 'Gagal menyimpan materi', true);
                }
            } catch (error) {
                showToast('Terjadi kesalahan jaringan', true);
            }
        }

        async function submitQuiz(e) {
            e.preventDefault();
            const options = [
                document.getElementById('q_opt0').value,
                document.getElementById('q_opt1').value,
                document.getElementById('q_opt2').value,
                document.getElementById('q_opt3').value
            ];
            const payload = {
                quiz_id: document.getElementById('q_id').value,
                question: document.getElementById('q_question').value,
                options_json: JSON.stringify(options),
                correct_index: parseInt(document.getElementById('q_correct').value),
                explanation: document.getElementById('q_explanation').value
            };
            try {
                const res = await fetch(`${API_URL}/api/admin/quiz`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message);
                    document.getElementById('form-quiz').reset();
                    loadQuiz();
                } else {
                    showToast(data.error || 'Gagal menyimpan soal kuis', true);
                }
            } catch (error) {
                showToast('Terjadi kesalahan jaringan', true);
            }
        }

        async function loadMateri() {
            const tbody = document.getElementById('admin-materi-list');
            if (!tbody) return;
            try {
                const res = await fetch(`${API_URL}/api/materi`);
                const data = await res.json();
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--text-mid);">Belum ada materi dinamis.</td></tr>`;
                    return;
                }
                data.forEach(m => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${m.materi_id}</td>
                        <td style="font-weight:600;">${m.title}</td>
                        <td>
                            <button class="btn-action" style="background: rgba(239, 68, 68, 0.1); color: var(--red);" 
                                    onclick="deleteMateri('${m.id}')">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--red);">Gagal memuat materi.</td></tr>`;
            }
        }

        async function deleteMateri(id) {
            if (!confirm('Yakin ingin menghapus materi ini?')) return;
            try {
                const res = await fetch(`${API_URL}/api/admin/materi/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                if (res.ok) {
                    showToast('Materi berhasil dihapus!');
                    loadMateri();
                } else {
                    showToast('Gagal menghapus materi', true);
                }
            } catch (error) {
                showToast('Terjadi kesalahan jaringan', true);
            }
        }

        async function loadQuiz() {
            const tbody = document.getElementById('admin-quiz-list');
            if (!tbody) return;
            try {
                const res = await fetch(`${API_URL}/api/quiz`);
                const data = await res.json();
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--text-mid);">Belum ada soal kuis dinamis.</td></tr>`;
                    return;
                }
                data.forEach(q => {
                    const tr = document.createElement('tr');
                    const options = JSON.parse(q.options_json);
                    tr.innerHTML = `
                        <td>${q.question}</td>
                        <td style="font-weight:600; color:var(--emerald);">${options[q.correct_index]}</td>
                        <td>
                            <button class="btn-action" style="background: rgba(239, 68, 68, 0.1); color: var(--red);" 
                                    onclick="deleteQuiz('${q.id}')">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--red);">Gagal memuat kuis.</td></tr>`;
            }
        }

        async function deleteQuiz(id) {
            if (!confirm('Yakin ingin menghapus soal kuis ini?')) return;
            try {
                const res = await fetch(`${API_URL}/api/admin/quiz/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                if (res.ok) {
                    showToast('Soal kuis berhasil dihapus!');
                    loadQuiz();
                } else {
                    showToast('Gagal menghapus kuis', true);
                }
            } catch (error) {
                showToast('Terjadi kesalahan jaringan', true);
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
